<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise - Login</title>

    <!-- Tailwind CSS e configuracao de cores do projeto -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rosa': '#FE008B',
                        'rosa-escuro': '#CB0854',
                        'roxo-escuro': '#63143F',
                        'berinjela': '#301B28',
                        'fundo-escuro': '#141213',
                        'fundo-card': '#252424',
                        'verde-escuro': '#17251D',
                        'verde-sage': '#97A28C',
                        'verde-cinza': '#999B94',
                        'branco': '#FDFCFD',
                        'creme': '#E9E8DB',
                    },
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body class="bg-[#141213] text-[#FDFCFD] font-['Inter'] min-h-screen">

   
    <!-- ========== CONTAINER ========== -->
    <div class="flex w-full min-h-screen">


        <!-- ========== PAINEL ESQUERDO ========== -->
        <div class="flex-1 bg-fundo-escuro p-10 flex flex-col relative overflow-hidden">


            <!-- Brilho roxo -->
            <div class="absolute -top-24 -left-24 w-72 h-72 bg-roxo-escuro/60 rounded-full blur-3xl"></div>

            <!-- Brilho verde -->
            <div class="absolute -bottom-12 left-1/2 -translate-x-1/2 w-96 h-72 bg-verde-escuro/80 rounded-full blur-3xl"></div>


            <!-- LOGO -->
            <div class="flex items-center gap-3 relative z-10">
                <div class="w-9 h-9 bg-gradient-to-br from-roxo-escuro to-rosa rounded-lg flex items-center justify-center text-lg text-branco">&#10022;</div>
                <span class="text-xl font-semibold">FinWise</span>
            </div>


            <!-- TITULO E SUBTEXTO -->
            <div class="flex-1 flex flex-col justify-center relative z-10">

                <h1 class="text-5xl font-bold leading-tight mb-5">
                    Controle financeiro <span class="text-rosa">simplificado.</span>
                </h1>

                <p class="text-verde-cinza text-base leading-relaxed max-w-md mb-8">
                    Visualize seu fluxo de caixa, defina metas e acompanhe investimentos em uma interface clara e moderna.
                </p>


                <!-- TAGS -->
                <div class="flex gap-3">
                    <span class="px-4 py-2 border border-verde-sage rounded-full text-xs font-medium text-verde-sage tracking-widest">GASTOS</span>
                    <span class="px-4 py-2 border border-verde-sage rounded-full text-xs font-medium text-verde-sage tracking-widest">META</span>
                    <span class="px-4 py-2 border border-verde-sage rounded-full text-xs font-medium text-verde-sage tracking-widest">INVESTIMENTOS</span>
                </div>

            </div>


        </div>

    <!--Painel direito (Login)-->
    <!-- ========== PAINEL DIREITO (LOGIN) ========== -->
        <div class="flex-1 bg-fundo-card flex items-center justify-center p-10">


            <div class="w-full max-w-sm">

                <h2 class="text-3xl font-bold mb-2">Bem-vindo de volta</h2>
                <p class="text-verde-cinza text-sm mb-8">Entre para continuar gerenciando suas finanças.</p>


                <form id="form-login">


                    <!-- CAMPO EMAIL -->
                    <div class="mb-5">
                        <label for="email" class="block text-sm font-medium text-creme mb-2">E-mail</label>
                        <div class="flex items-center bg-fundo-escuro border border-gray-700 rounded-lg px-4 py-3 gap-3 focus-within:border-rosa">
                            <span class="text-verde-cinza">&#9993;</span>
                            <input type="email" id="email" placeholder="seu@email.com" required
                                class="flex-1 bg-transparent border-none outline-none text-branco text-sm placeholder-gray-600 font-inter">
                        </div>
                    </div>


                    <!-- CAMPO SENHA -->
                    <div class="mb-5">
                        <div class="flex justify-between items-center mb-2">
                            <label for="senha" class="text-sm font-medium text-creme">Senha</label>
                            <a href="#" class="text-xs text-rosa hover:underline">Esqueci minha senha</a>
                        </div>
                        <div class="flex items-center bg-fundo-escuro border border-gray-700 rounded-lg px-4 py-3 gap-3 focus-within:border-rosa">
                            <span class="text-verde-cinza">&#128274;</span>
                            <input type="password" id="senha" placeholder="••••••••" required
                                class="flex-1 bg-transparent border-none outline-none text-branco text-sm placeholder-gray-600 font-inter">
                        </div>
                    </div>


                    <!-- BOTAO ENTRAR -->
                    <button type="submit"
                        class="w-full py-3.5 rounded-lg bg-gradient-to-r from-rosa to-roxo-escuro text-branco font-semibold text-base mt-3 hover:opacity-90 transition-opacity">
                        Entrar &rarr;
                    </button>


                </form>


                <p class="text-center mt-6 text-sm text-verde-cinza">
                    Não tem conta? <a href="#" class="text-rosa font-medium hover:underline">Criar conta</a>
                </p>

            </div>


        </div>

        <!--Fim Painel Direito-->

</body>
