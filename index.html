<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<head>
<body>
   
    <div class="container">


        <!--Painel Esquerdo-->
        <div class="painel-esquerdo">


                <!--Logo-->
                <div class="logo">
                    <div class="logo-icone">&#10022;</div>
                    <span class="logo-texto">FinWise</span>
                </div>


                <!--Título e Subtexto-->
                </div class="painel-esquerdo-conteudo">
                    <h1>Controle financeiro <span class="destaque">simplificado.</span></h1>
                    <p class="subtexto">Visualize seu fluxo de caixa, defina metas e acompanhe investimentos em uma interface clara e moderna.</p>


                     <!--Tags-->
                    <div class="tags">
                        <span class="tag">GASTOS</span>
                        <span class="tag">METAS</span>
                        <span class="tag">INVESTIMENTOS</span>
                    </div>
        
                 </div>

        </div>
    </div>
    <!--Painel direito (Login)-->
    <div class="painel-direito">

            <div class="formulario-login">
                <h2>Bem-vindo de volta</h2>
                <p class="formulario-subtexto">Entre para continuar gerenciando suas finanças.</p>

            </div>


        </div>
        <!--Fim Painel Direito-->
</body>
